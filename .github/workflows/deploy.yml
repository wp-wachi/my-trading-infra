name: Deploy My Trading to Droplet

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # 1. เข้าไปที่โฟลเดอร์โปรเจกต์ (ถ้าไม่มีให้สร้างและ clone)
            if [ ! -d "~/my-trading" ]; then
              mkdir -p ~/my-trading && cd ~/my-trading
              git clone https://github.com/${{ github.repository_owner }}/my-trading-infra.git .
              git clone https://github.com/${{ github.repository_owner }}/my-trading-app.git ~/my-trading-app
            else
              cd ~/my-trading && git pull origin main
              cd ~/my-trading-app && git pull origin main
            fi

            # 2. รัน Docker Compose (ใช้ไฟล์ .env ที่เราจะไปสร้างทิ้งไว้บน Droplet)
            cd ~/my-trading
            docker-compose up -d --build

            # 3. ล้าง Image เก่าๆ เพื่อประหยัดพื้นที่ Droplet
            docker image prune -f
