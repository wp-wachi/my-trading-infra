name: Deploy My Trading to Droplet

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # 1. จัดการโฟลเดอร์ Infra (ตัวหลัก)
            if [ ! -d "my-trading" ]; then
              git clone https://github.com/${{ github.repository_owner }}/my-trading-infra.git my-trading
            fi
            
            # 2. จัดการโฟลเดอร์ App (ตัวโค้ด Next.js)
            if [ ! -d "my-trading-app" ]; then
              git clone https://github.com/${{ github.repository_owner }}/my-trading-app.git my-trading-app
            fi

            # 3. อัปเดตโค้ดล่าสุดทั้งสอง Repo
            cd ~/my-trading && git pull origin main
            cd ~/my-trading-app && git pull origin main

            # 4. สั่งรัน Docker Compose
            cd ~/my-trading
            docker-compose up -d --build
            
            # 5. ล้างขยะ (Image เก่าๆ)
            docker image prune -f
