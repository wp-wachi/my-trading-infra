name: Deploy My Trading to Droplet

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # 1. จัดการโฟลเดอร์ Infra (ตัวหลัก)
            if [ ! -d "my-trading" ]; then
              git clone https://github.com/${{ github.repository_owner }}/my-trading-infra.git my-trading
            fi
            
            cd ~/my-trading
            
            # 2. อัปเดตไฟล์ docker-compose.yml ล่าสุด
            git pull origin main

            # 3. ดึง Image ล่าสุดจาก GHCR (ไม่ต้อง clone/pull repo app แล้ว)
            # หมายเหตุ: ถ้าตั้ง package เป็น public จะ pull ได้ทันที
            docker compose pull trading-app

            # 4. สั่งรัน Docker Compose (ใช้คำสั่ง 'docker compose' เว้นวรรคตามมาตรฐานใหม่)
            docker compose up -d
            
            # 5. ล้างขยะ (Image เก่าๆ)
            docker image prune -f
